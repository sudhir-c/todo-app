name: todo_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  http: ^1.6.0
  intl: ^0.20.2
  path: ^1.9.1
  sqflite: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  fonts:
      - family: Bungee
        fonts:
          - asset: fonts/Bungee-Regular.ttf
      - family: Jost
        fonts:
          - asset: fonts/Jost-Regular.ttf
          - asset: fonts/Jost-Bold.ttf
            weight: 700
  assets:
      - .env
  uses-material-design: true

